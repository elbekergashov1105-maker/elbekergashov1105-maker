name: Generate Snake

on:
  schedule: # har kuni yangilanishi uchun
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@master
        with:
          github_user_name: elbekergashov1105-maker
          outputs: dist/snike.svg
      - name: Push to main branch
        uses: crazy-max/ghaction-github-pages@v2
        with:
          target_branch: main
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
